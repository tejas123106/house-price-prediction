<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>House Price Prediction</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --accent: #4f46e5;
      --accent-2: #06b6d4;
      --card-bg: rgba(255,255,255,0.88);
      --muted: #6b7280;
      --radius: 14px;
    }
    *{box-sizing:border-box; font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;}
    html,body{height:100%; margin:0}
    body{
      background-image:
        linear-gradient(120deg, rgba(2,6,23,0.55), rgba(2,6,23,0.15)),
        url('/static/house.jpg');
      background-size: cover; background-position:center; background-repeat:no-repeat;
      display:flex; align-items:center; justify-content:center; padding:40px;
    }
    .wrap{ width:100%; max-width:980px; display:grid; grid-template-columns:1fr 420px; gap:32px; align-items:center; }
    .hero{
      color:white; padding:28px; border-radius:var(--radius); backdrop-filter: blur(6px);
      background: linear-gradient(90deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
    }
    .hero h1{font-size:34px; margin:0 0 10px}
    .hero p{color:var(--muted); margin:0 0 18px}
    .card{
      background:var(--card-bg); padding:26px; border-radius:18px; box-shadow:0 12px 30px rgba(2,6,23,0.35);
      border:1px solid rgba(15,23,42,0.06);
    }
    .field{margin-bottom:14px}
    label{display:block; font-size:13px; color:#374151; margin-bottom:6px; font-weight:600}
    input[type=number], select{
      width:100%; padding:12px 14px; font-size:15px; border-radius:10px; border:1px solid #e6e9ef;
      outline:none; background:white; transition:box-shadow .15s ease, transform .05s ease;
    }
    input[type=number]:focus, select:focus{box-shadow:0 8px 24px rgba(79,70,229,0.12); transform:translateY(-1px)}
    .row{display:grid; grid-template-columns:1fr 1fr; gap:12px}
    .btn{
      display:inline-flex; gap:10px; align-items:center; justify-content:center; padding:12px 16px; border-radius:12px;
      font-weight:700; border:none; cursor:pointer; font-size:15px; background:linear-gradient(90deg,var(--accent),var(--accent-2)); color:white;
      box-shadow:0 8px 20px rgba(79,70,229,0.18);
    }
    .note{font-size:13px; color:var(--muted); margin-top:10px}
    @media (max-width:880px){
      .wrap{grid-template-columns:1fr; padding:18px;}
      .hero{order:2}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>Find your home's market price</h1>
      <p>Quickly estimate a price using property details. Replace <code>/static/house.jpg</code> with your image.</p>
      <p class="note">Tip: put a `house.jpg` in your Flask `static/` folder or use a direct image URL (recommended size ~1600×900).</p>
    </div>

    <div class="card">
      <form action="/predict" method="POST">
        <div class="row">
          <div class="field">
            <label for="bedrooms">Bedrooms</label>
            <input id="bedrooms" name="bedrooms" type="number" min="0" required>
          </div>

          <div class="field">
            <label for="bathrooms">Bathrooms</label>
            <input id="bathrooms" name="bathrooms" type="number" min="0" required>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="age">Age (years)</label>
            <input id="age" name="age" type="number" min="0" required>
          </div>

          <div class="field">
            <label for="sqft">Square Feet</label>
            <input id="sqft" name="sqft" type="number" min="0" required>
          </div>
        </div>

        <div class="field">
          <label for="parking">Parking spaces</label>
          <input id="parking" name="parking" type="number" min="0" required>
        </div>

        <div class="field">
          <label for="location">Location</label>
          <select id="location" name="location" required>
            {% for loc in locations %}
              <option value="{{ loc }}">{{ loc }}</option>
            {% endfor %}
          </select>
        </div>

        <div style="display:flex; gap:12px; align-items:center; margin-top:6px">
          <button class="btn" type="submit">Predict Price</button>
          <a href="/" style="text-decoration:none; color:var(--accent); font-weight:600;">Reset</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
