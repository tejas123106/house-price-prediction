<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Prediction Result</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box; font-family:'Poppins', system-ui, -apple-system, 'Segoe UI', Roboto, Arial;}
    html,body{height:100%; margin:0}
    body{
      background-image:
        linear-gradient(120deg, rgba(2,6,23,0.7), rgba(79,70,229,0.18)),
        url('/static/house.jpg');
      background-size:cover; background-position:center; display:flex; align-items:center; justify-content:center; padding:28px;
    }
    .card{
      background:rgba(255,255,255,0.96); padding:28px; border-radius:18px; max-width:640px; width:100%; text-align:center;
      box-shadow:0 12px 40px rgba(2,6,23,0.28);
    }
    h1{margin:0 0 6px; font-size:22px}
    .price{font-size:44px; margin:12px 0; color:#111827; font-weight:800}
    .sub{color:#6b7280; margin-bottom:18px}
    .details{display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-top:14px}
    .detail{background:#f8fafc; padding:12px; border-radius:10px; font-weight:700}
    .back{display:inline-block; margin-top:18px; text-decoration:none; padding:10px 16px; border-radius:10px; border:1px solid rgba(15,23,42,0.06); color:#111827}
    @media (max-width:520px){
      .details{grid-template-columns:1fr}
      .price{font-size:36px}
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Predicted House Price</h1>
    <div class="price">₹ {{ price }} Lakhs</div>
    <div class="sub">This is an estimated price based on the values you provided.</div>

    <div class="details">
      <div class="detail">Bedrooms: {{ bedrooms }}</div>
      <div class="detail">Bathrooms: {{ bathrooms }}</div>
      <div class="detail">Sqft: {{ sqft }}</div>
      <div class="detail">Location: {{ location }}</div>
    </div>

    <a class="back" href="/">🔙 Back to Form</a>
  </div>
</body>
</html>
